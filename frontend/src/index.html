  <script>
    (function(){
      var h=document.documentElement,m=window.matchMedia('(prefers-color-scheme:dark)');
      function apply(e){h.classList.toggle('dark',e.matches);}
      apply(m);m.addEventListener('change',apply);
    })();
  </script>
  <style id="dm">
    /* ══ Dark Mode overrides per content estratto da Stitch ══ */
    html.dark body{background-color:#0f172a;color:#f1f5f9}
    html.dark .bg-white{background-color:#1e293b!important}
    html.dark .bg-slate-50, html.dark .bg-slate-50\/50, html.dark .bg-slate-50\/60{background-color:#0f172a!important}
    html.dark .bg-slate-100, html.dark .bg-slate-100\/80{background-color:#1e293b!important}
    html.dark .bg-slate-200{background-color:#334155!important}
    html.dark .bg-background, html.dark .bg-surface{background-color:#0f172a!important}
    html.dark .bg-surface-container-low{background-color:#1e293b!important}
    html.dark .text-slate-900, html.dark .text-on-background, html.dark .text-on-surface{color:#f8fafc!important}
    html.dark .text-slate-800{color:#f1f5f9!important}
    html.dark .text-slate-700{color:#e2e8f0!important}
    html.dark .text-slate-600{color:#cbd5e1!important}
    html.dark .text-slate-500{color:#94a3b8!important}
    html.dark .text-slate-400{color:#64748b!important}
    html.dark .text-slate-300{color:#475569!important}
    html.dark .text-primary, html.dark .text-teal-600{color:#2dd4bf!important}
    html.dark .text-teal-700{color:#5eead4!important}
    html.dark .text-teal-800{color:#99f6e4!important}
    html.dark .text-teal-200{color:#5eead4!important}
    html.dark .border-slate-200{border-color:#334155!important}
    html.dark .border-slate-100{border-color:#1e293b!important}
    html.dark .border-teal-100{border-color:rgba(45,212,191,.2)!important}
    html.dark .border-teal-200{border-color:rgba(45,212,191,.3)!important}
    html.dark .bg-teal-50{background-color:rgba(20,184,166,.08)!important}
    html.dark .bg-teal-100{background-color:rgba(20,184,166,.14)!important}
    html.dark .bg-teal-600{background-color:#0f766e!important}
    html.dark .bg-primary{background-color:#0f766e!important}
    html.dark .bg-primary\/10{background-color:rgba(45,212,191,.1)!important}
    html.dark .bg-secondary-container{background-color:rgba(59,130,246,.15)!important}
    html.dark .text-on-secondary-container{color:#93c5fd!important}
    html.dark .bg-blue-100{background-color:rgba(59,130,246,.15)!important}
    html.dark .text-blue-600{color:#93c5fd!important}
    html.dark .bg-success\/10{background-color:rgba(22,163,74,.15)!important}
    html.dark .bg-warning\/10{background-color:rgba(217,119,6,.15)!important}
    html.dark .bg-error\/10, html.dark .bg-error-container{background-color:rgba(220,38,38,.15)!important}
    html.dark .text-success{color:#4ade80!important}
    html.dark .text-warning{color:#fbbf24!important}
    html.dark .text-error{color:#f87171!important}
    html.dark .border-l-error{border-left-color:#f87171!important}
    html.dark .border-l-primary{border-left-color:#2dd4bf!important}
    html.dark .divide-slate-200>*+*{border-color:#334155!important}
    html.dark input,html.dark textarea,html.dark select{
      background-color:#1e293b!important;
      border-color:#475569!important;
      color:#f1f5f9!important}
    html.dark input::placeholder, html.dark textarea::placeholder{color:#64748b!important}
    html.dark input:focus, html.dark textarea:focus{
      border-color:#2dd4bf!important;
      box-shadow:0 0 0 3px rgba(45,212,191,.15)!important}
    html.dark thead tr{background-color:#0f172a!important}
    html.dark th{color:#94a3b8!important}
    html.dark td{color:#e2e8f0!important}
    html.dark tbody tr:hover, html.dark .hover\:bg-white:hover{background-color:#334155!important}
    html.dark .shadow-sm{box-shadow:0 1px 4px rgba(0,0,0,.5)!important}
    html.dark .shadow-xl, html.dark .shadow-lg{box-shadow:0 10px 30px rgba(0,0,0,.6)!important}
    html.dark .clinical-shadow{box-shadow:0 1px 3px rgba(0,0,0,.4)!important}
    @media(max-width:767px){
      main .overflow-hidden{overflow-x:auto!important}
      main table{min-width:480px}
      main .grid-cols-3,main .grid-cols-4{grid-template-columns:repeat(2,1fr)!important}
      main .grid-cols-2{grid-template-columns:1fr!important}
    }
    @media(min-width:768px) and (max-width:1023px){
      main .grid-cols-4{grid-template-columns:repeat(2,1fr)!important}
    }

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .material-symbols-outlined[data-weight="fill"] {
        font-variation-settings: 'FILL' 1;
    }
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
