# Production Configuration - PostgreSQL
# Configure your PostgreSQL connection string here

spring.application.name=dentalcare-api
server.port=8080

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dentalcare}?sslmode=verify-full
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true

# Logging
logging.level.root=WARN
logging.level.com.dentalcare=INFO
logging.level.org.springframework.web=INFO
