# DentalCare Pro — Deploy
# Avvio:  docker compose up -d --build
# Update: docker compose pull && docker compose up -d --build
#
# Config opzionale: crea config/backend/application.properties dal template
# config/backend/application.properties.example per sovrascrivere i default.
# Se la cartella non esiste Spring usa i default del classpath (dev/LAN).

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        JDK_VERSION: "21"
    image: dentalcarepro-backend:${VERSION:-latest}
    container_name: dentalcarepro-backend
    restart: unless-stopped
    volumes:
      - ./config/backend:/app/config:ro
    environment:
      - SPRING_CONFIG_ADDITIONAL_LOCATION=optional:file:/app/config/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health > /dev/null 2>&1 || wget -qO- http://localhost:8080/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - dentalcarepro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dentalcarepro-frontend:${VERSION:-latest}
    container_name: dentalcarepro-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dentalcarepro

networks:
  dentalcarepro:
    driver: bridge
