# DentalCare Pro — Deploy produzione (file unico)
# Eseguire da: ~/docker/dentalcarepro/
#   docker compose up -d --build
#
# - backend  : Spring Boot, profilo "prod", NON esposto sull'host.
#              Config esterna montata da ./config -> /app/config
#              (Spring carica /app/config/application-prod.properties => db dentalcare_prod).
# - frontend : nginx (porta 4200 nel container) che serve la SPA e proxa /api al backend.
#              Esposto sull'host su ${FRONTEND_PORT:-8181} -> 4200.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        JDK_VERSION: "25"
    image: dentalcarepro-backend:${VERSION:-latest}
    container_name: dentalcarepro-backend
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_ADDITIONAL_LOCATION=optional:file:/app/config/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/public/demo-config > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - dentalcarepro
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dentalcarepro-frontend:${VERSION:-latest}
    container_name: dentalcarepro-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8181}:4200"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - dentalcarepro

  dentalcare-ai-service:
    build:
      context: ./dentalcare-ai-service
      dockerfile: Dockerfile
    image: dentalcare-ai-service:${VERSION:-latest}
    container_name: dentalcare-ai-service
    restart: unless-stopped
    env_file:
      - path: ./dentalcare-ai-service/.env
        required: false
    volumes:
      - ./dentalcare-ai-service/models:/app/models:ro
      - ./dentalcare-ai-service/tmp:/tmp/dentalcare-ai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4g
    networks:
      - dentalcarepro
      - minio

networks:
  dentalcarepro:
    driver: bridge
  # Rete del container MinIO (compose separato "minio" → rete "minio_default").
  # Backend e ai-service vi si agganciano per raggiungere MinIO col nome container.
  minio:
    external: true
    name: minio_default
