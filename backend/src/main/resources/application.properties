spring.application.name=dentalcare-api

# PostgreSQL
spring.datasource.url=jdbc:postgresql://192.168.0.173:5432/dentalcarepro
spring.datasource.username=postgres
spring.datasource.password=ViaGoceano2021
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA - no DDL, no schema validation
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway: abilitato con baseline per applicare V5+ senza riapplicare V1-V4
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=dentalcare

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Tenant provisioning
# Lascia vuoto per usare pg_default (nessun tablespace fisico separato).
# Se valorizzato, il path deve esistere sul server PostgreSQL e appartenere a postgres:
#   mkdir -p /mnt/tenants && chown postgres:postgres /mnt/tenants
tenant.tablespace.base-path=

# Server
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.dentalcare=DEBUG
logging.level.org.springframework.jdbc.core=WARN

# Dev: error details visibili nel JSON di risposta
server.error.include-message=always
server.error.include-binding-errors=always
