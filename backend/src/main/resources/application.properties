spring.application.name=dentalcare-api

# Segreti reali importati da credentials/credential.properties (gitignored).
# Path relativo alla working dir: backend/ (../credentials) o root (./credentials).
spring.config.import=optional:file:../credentials/credential.properties,optional:file:./credentials/credential.properties

# PostgreSQL
spring.datasource.url=jdbc:postgresql://192.168.0.173:5432/dentalcarepro
spring.datasource.username=postgres
# spring.datasource.password -> credentials/credential.properties
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA - no DDL, no schema validation
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# OSIV off: niente EntityManager/connessione legati alla richiesta per tutta la sua durata
# (necessario per lo streaming SSE: evita di tenere occupate le connessioni Hikari).
spring.jpa.open-in-view=false

# Flyway: abilitato con baseline per applicare V5+ senza riapplicare V1-V4
spring.flyway.enabled=false
app.flyway.schemas=dentalcare
app.flyway.baseline-version=4
app.flyway.locations=classpath:db/migration

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# JWT
# app.jwt.secret -> credentials/credential.properties
app.jwt.expiration-ms=86400000

# Tenant provisioning
# Lascia vuoto per usare pg_default (nessun tablespace fisico separato).
# Se valorizzato, il path deve esistere sul server PostgreSQL e appartenere a postgres:
#   mkdir -p /mnt/tenants && chown postgres:postgres /mnt/tenants
tenant.tablespace.base-path=

# n8n service account — genera un segreto casuale e mettilo anche nel credential n8n
app.n8n.service-key=REPLACE_WITH_RANDOM_SECRET
# Se non specificati, usa le credenziali demo come service account
# app.n8n.admin-email=admin@tuo-studio.it
# app.n8n.admin-password=password

# Demo mode: se true pre-compila email e password nella pagina di login
app.demo.enabled=true
app.demo.email=demo@demo.dentalcare.it
app.demo.password=DemoAdmin1!
app.demo.schema=t_9d754153

# Mail (SMTP)
spring.mail.host=192.168.0.68
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false
app.mail.from=noreply@dentalcare.it
app.mail.send-real-emails=false

# Server
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.dentalcare=DEBUG
logging.level.org.springframework.jdbc.core=WARN

# Dev: error details visibili nel JSON di risposta
server.error.include-message=always
server.error.include-binding-errors=always

# AI Chat
# spring.ai.openai.api-key -> credentials/credential.properties
app.ai.model=gpt-4o
