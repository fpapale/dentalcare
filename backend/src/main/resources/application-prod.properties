spring.application.name=dentalcare-api
server.port=8080

# PostgreSQL - DentalCare_Prod su 192.168.0.173
spring.datasource.url=jdbc:postgresql://192.168.0.173:5432/DentalCare_Prod
spring.datasource.username=postgres
spring.datasource.password=ViaGoceano2021
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway: Spring auto-flyway disabilitato — usa FlywayConfig custom
spring.flyway.enabled=false
app.flyway.schemas=dentalcare
app.flyway.baseline-version=17
app.flyway.locations=classpath:db/migration

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Tenant provisioning - tablespace dedicato per ogni nuovo tenant
# Il path deve esistere sul server PostgreSQL (chown postgres:postgres)
tenant.tablespace.base-path=/var/lib/postgresql/tablespaces

# Logging
logging.level.root=WARN
logging.level.com.dentalcare=INFO
logging.level.org.springframework.web=INFO
logging.level.org.flywaydb=INFO

# Non esporre dettagli errori in produzione
server.error.include-message=never
server.error.include-binding-errors=never
