spring.application.name=dentalcare-api

# PostgreSQL - dentalcare_prod su 192.168.0.173
spring.datasource.url=jdbc:postgresql://192.168.0.173:5432/dentalcare_prod
spring.datasource.username=postgres
# spring.datasource.password -> credentials/credential.properties
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA - no DDL, no schema validation
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# OSIV off: necessario per lo streaming SSE, evita di tenere occupate le connessioni Hikari.
spring.jpa.open-in-view=false

# Flyway: gestito da FlywayConfig custom
spring.flyway.enabled=false
app.flyway.schemas=dentalcare
app.flyway.baseline-version=4
app.flyway.locations=classpath:db/migration

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# JWT -> credentials/credential.properties
app.jwt.expiration-ms=86400000

# AI inference service (Python YOLO service) — override reale in backend/config/ (gitignored)
app.ai.base-url=http://dentalcare-ai-service:8000
# app.ai.hmac-secret deve combaciare con AI_CALLBACK_SECRET dell'ai-service -> backend/config/application-prod.properties
app.ai.hmac-secret=CHANGE_ME_HMAC_SECRET_PLACEHOLDER

# MinIO object storage — override reale (endpoint + credenziali) in config/ montata (gitignored)
app.minio.endpoint=http://host.docker.internal:9000
app.minio.access-key=CHANGE_ME_MINIO_USER
app.minio.secret-key=CHANGE_ME_MINIO_PASSWORD
app.minio.bucket-prefix=dc-

# Tenant provisioning
# Lascia vuoto per usare pg_default (nessun tablespace fisico separato).
tenant.tablespace.base-path=

# Demo mode: disabilitato in produzione
app.demo.enabled=false

# Mail (SMTP)
spring.mail.host=192.168.0.68
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false
app.mail.from=noreply@dentalcare.it
app.mail.send-real-emails=false

# Server
server.port=8080

# Logging
logging.level.root=WARN
logging.level.com.dentalcare=INFO
logging.level.org.springframework.jdbc.core=WARN

# Produzione: non esporre dettagli errori nel JSON di risposta
server.error.include-message=never
server.error.include-binding-errors=never
