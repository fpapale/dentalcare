# DentalCare Pro — Override Produzione
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Differenze rispetto al base: backend non esposto, limiti memoria, porta 80 frontend.

services:

  backend:
    container_name: dentalcarepro-backend-prod
    ports: []
    environment:
      - SPRING_CONFIG_ADDITIONAL_LOCATION=optional:file:/app/config/
      - SPRING_PROFILES_ACTIVE=prod
    deploy:
      resources:
        limits:
          memory: 1g

  frontend:
    container_name: dentalcarepro-frontend-prod
    ports:
      - "${FRONTEND_PORT:-80}:80"
    deploy:
      resources:
        limits:
          memory: 256m
